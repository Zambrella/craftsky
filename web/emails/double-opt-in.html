<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="format-detection" content="telephone=no" />
  <title>Confirm your Craftsky waiting-list signup</title>
  <!-- Web fonts: ignored by Outlook/Windows but honoured by Apple Mail and
       most iOS / mobile clients. Solid fallbacks below. -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" type="text/css" />
  <style type="text/css">
    *{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
    body{font-family:'Outfit',helvetica,arial,sans-serif;}
    table{margin:0 auto;}
    div,a,li,td{-webkit-text-size-adjust:none;}
    @media only screen and (max-width:640px){table[class=full]{width:100%!important;}}
    @media only screen and (max-width:479px){table[class=fullcenter]{width:100%!important;text-align:center!important;}}
  </style>
</head>
<body style="margin:0;padding:0;background:#F5EFE4;">
<table width="100%" cellspacing="0" cellpadding="0" border="0" align="center" bgcolor="#F5EFE4" style="background:#F5EFE4;">
  <tbody>
  <tr>
    <td>
      <table class="full" align="center" width="570" border="0" cellpadding="0" cellspacing="0" style="padding:0 5px;">
        <tbody>
        <tr>
          <td height="40" width="100%"></td>
        </tr>
        <!-- Wordmark -->
        <tr>
          <td align="center" style="padding:0 20px;text-align:center;font-family:'DM Serif Display',Georgia,'Times New Roman',serif;font-size:28px;color:#161210;line-height:1;letter-spacing:-0.01em;" valign="middle" width="100%">
            Craftsky
          </td>
        </tr>
        <tr>
          <td height="40" width="100%"></td>
        </tr>
        <!---------------------- begin Content -------------------->
        <!-- Title -->
        <tr>
          <td align="center" style="padding:0 20px;text-align:center;font-family:'DM Serif Display',Georgia,'Times New Roman',serif;font-size:36px;color:#161210;line-height:1.1;letter-spacing:-0.02em;" valign="middle" width="100%">
            One last thing.
          </td>
        </tr>
        <tr>
          <td height="20" width="100%"></td>
        </tr>
        <!-- Body -->
        <tr>
          <td align="center" style="padding:0 30px;text-align:center;font-family:'Outfit',helvetica,arial,sans-serif;font-size:16px;color:#3E3733;line-height:24px;" valign="middle" width="100%">
            Tap the button below to confirm your email and we'll add you to the Craftsky waiting list.
          </td>
        </tr>
        <tr>
          <td height="30" width="100%"></td>
        </tr>
        <!-- Button -->
        <tr>
          <td align="center" style="padding:0 20px;text-align:center;" valign="middle" width="100%">
            <table cellspacing="0" cellpadding="0" border="0" align="center" class="fullcenter">
              <tbody>
              <tr>
                <td style="background:#1535D6;-webkit-border-radius:999px;-moz-border-radius:999px;border-radius:999px;padding:0 32px;font-weight:700;color:#ffffff;" align="center" bgcolor="#1535D6" height="48">
                  <a href="{{ doubleoptin }}" target="_blank" style="font-family:'Outfit',helvetica,arial,sans-serif;color:#ffffff;font-size:16px;text-decoration:none;line-height:48px;display:inline-block;font-weight:700;">Confirm my email</a>
                </td>
              </tr>
              </tbody>
            </table>
          </td>
        </tr>
        <tr>
          <td height="30" width="100%"></td>
        </tr>
        <!-- Helper text -->
        <tr>
          <td align="center" style="padding:0 30px;text-align:center;font-family:'Outfit',helvetica,arial,sans-serif;font-size:14px;color:#7A716B;line-height:22px;" valign="middle" width="100%">
            If you didn't sign up, just delete this email — we won't add you to anything.
          </td>
        </tr>
        <!---------------------- end Content ---------------------->
        <tr>
          <td height="40" width="100%"></td>
        </tr>
        <!-- Hairline divider -->
        <tr>
          <td align="center" style="padding:0 30px;" valign="middle" width="100%">
            <table cellspacing="0" cellpadding="0" border="0" align="center" width="100%">
              <tbody>
                <tr>
                  <td height="1" bgcolor="#D8D2C5" style="background:#D8D2C5;line-height:1px;font-size:1px;">&nbsp;</td>
                </tr>
              </tbody>
            </table>
          </td>
        </tr>
        <tr>
          <td height="20" width="100%"></td>
        </tr>
        <!-- Footer -->
        <tr>
          <td align="center" style="padding:0 30px;text-align:center;font-family:'Outfit',helvetica,arial,sans-serif;font-size:14px;color:#7A716B;line-height:22px;" valign="middle" width="100%">
            Follow <a href="https://bsky.app/profile/craftsky.social" target="_blank" style="color:#1535D6;text-decoration:none;font-weight:700;">@craftsky.social</a> on Bluesky for updates.
          </td>
        </tr>
        <tr>
          <td height="40" width="100%"></td>
        </tr>
        </tbody>
      </table>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
