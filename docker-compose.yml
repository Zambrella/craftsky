services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: craftsky
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: craftsky_dev
    ports:
      # Host 5433 → container 5432 to avoid clashing with a native
      # Postgres some contributors run on 5432. Inside the compose
      # network, services still connect via `postgres:5432`.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craftsky -d craftsky_dev"]
      interval: 2s
      timeout: 2s
      retries: 15

  migrate:
    build:
      context: ./appview
      dockerfile: Dockerfile
    # Override the image's ENTRYPOINT (/app/appview) so the command runs the
    # CLI binary directly instead of being appended as arguments.
    entrypoint: []
    command: ["/app/cli", "migrate", "up"]
    environment:
      DATABASE_URL: postgres://craftsky:dev@postgres:5432/craftsky_dev?sslmode=disable
      APPVIEW_ENV: dev
      ALLOWED_ORIGINS: "*"
      CRAFTSKY_DEV_DID: did:plc:jt3cxdyrhjhrkpwzdvonheax
      # TAP_WS_URL is required by LoadConfig but unused by `cli migrate`.
      # Kept here so a single compose-level config satisfies all services.
      TAP_WS_URL: ws://tap:2480/channel
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  tap:
    image: ghcr.io/bluesky-social/indigo/tap:0.1.10
    restart: unless-stopped
    environment:
      TAP_RELAY_URL: https://relay1.us-east.bsky.network
      TAP_DATABASE_URL: sqlite:///data/tap.db
      # Deliver only the record types our indexers register — see
      # appview/internal/app/deps.go (dispatcher.Register calls).
      # Widening this requires a matching indexer on the appview side,
      # otherwise events hit index.NotImplemented{} and Tap retries forever.
      TAP_COLLECTION_FILTERS: "social.craftsky.actor.profile,social.craftsky.feed.post,social.craftsky.feed.like,social.craftsky.feed.repost,app.bsky.actor.profile,app.bsky.graph.follow,app.bsky.graph.block"
      # Auto-discover any repo with a Craftsky profile record. Once a
      # user onboards (InitializeProfile writes social.craftsky.actor.profile
      # via the OAuth callback) the firehose event triggers Tap to add the
      # repo to its watch list and backfill existing records. The static
      # tap-bootstrap below still seeds a handful of known dev DIDs for a
      # fast first-boot path but is now redundant for real users.
      TAP_SIGNAL_COLLECTION: "social.craftsky.actor.profile"
      TAP_LOG_LEVEL: info
      TAP_NO_REPLAY: "true"
    volumes:
      - tapdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2480/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # tap-bootstrap is now mostly redundant: TAP_SIGNAL_COLLECTION on the
  # tap service auto-discovers any repo that writes a Craftsky profile
  # record. We keep it as a backfill helper for repos that wrote their
  # profile record BEFORE signal-collection was configured — Tap only
  # discovers on live firehose events, so pre-existing records don't get
  # ingested until the user writes again. Explicitly POSTing a DID to
  # /repos/add triggers a one-time resync that pulls their existing
  # records.
  #
  # Add dev DIDs here as needed; real users don't need an entry.
  tap-bootstrap:
    image: curlimages/curl:8.9.1
    depends_on:
      tap:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        curl -fsS -X POST http://tap:2480/repos/add \
          -H "Content-Type: application/json" \
          -d '{"dids":["did:plc:jt3cxdyrhjhrkpwzdvonheax"]}'

  appview:
    build:
      context: ./appview
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      tap:
        condition: service_healthy
      tap-bootstrap:
        condition: service_completed_successfully
    env_file:
      - ./appview/environments/dev.env
    environment:
      APPVIEW_ENV: dev
      DATABASE_URL: postgres://craftsky:dev@postgres:5432/craftsky_dev?sslmode=disable
      TAP_WS_URL: ws://tap:2480/channel
      TAP_ACK_TIMEOUT: "10s"
      TAP_RECONNECT_MAX: "30s"
      TAP_MAX_RETRIES: "5"
      ALLOWED_ORIGINS: "*"
      CRAFTSKY_DEV_DID: did:plc:craftsky-dev-user
    ports:
      # Host 18080 → container 8080. Host port differs from the internal
      # listen port to avoid colliding with other dev servers commonly on
      # :8080. Update .zed/tasks.json's CRAFTSKY_API_BASE_URL to match.
      - "18080:8080"
    volumes:
      - ./appview/devmedia:/app/devmedia:ro

volumes:
  pgdata:
  tapdata:
