name: craftsky_app
description: "Craftsky — crafting-focused social platform on AT Protocol."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.0.0

  # Platform / init
  logging: ^1.3.0
  shared_preferences: ^2.5.4
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  pub_semver: ^2.2.0
  intl: ^0.20.2

  # Theming
  flex_color_scheme: ^8.4.0
  dynamic_color: ^1.8.1

  # Serialization
  dart_mappable: ^4.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.10.4
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.0.3
  custom_lint: ^0.8.1
  go_router_builder: ^4.1.3
  dart_mappable_builder: ^4.6.3

flutter:
  uses-material-design: true
