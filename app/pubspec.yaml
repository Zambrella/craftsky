name: craftsky_app
description: "CraftSky — crafting-focused social platform on AT Protocol."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  animated_list_plus: ^0.5.2
  app_settings: ^7.0.0
  at_primitives: ^1.0.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dart_mappable: ^4.6.1
  device_info_plus: ^13.1.0
  dio: ^5.7.0
  dynamic_color: ^1.8.1
  file_selector: ^1.1.0
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  flutter_form_builder: ^10.3.0+2
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.2.0
  form_builder_validators: ^11.3.0
  go_router: ^17.0.0
  google_fonts: ^8.1.0
  image: ^4.5.4
  image_picker: ^1.2.0
  intl: ^0.20.2
  logging: ^1.3.0
  mime: ^2.0.0
  multiformats: ^1.0.2
  package_info_plus: ^10.1.0
  pinch_zoom: ^2.0.1
  pub_semver: ^2.2.0
  riverpod_annotation: ^4.0.2
  sentry_flutter: ^9.23.0
  shared_preferences: ^2.5.4
  smooth_page_indicator: ^2.0.1
  timeago: ^3.7.1
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.10.4
  dart_mappable_builder: ^4.6.3
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.1.3
  http_mock_adapter: ^0.6.1
  path_provider_platform_interface: ^2.1.2
  plugin_platform_interface: ^2.1.8
  riverpod_generator: ^4.0.3
  sentry_dart_plugin: ^3.4.0
  sqflite: ^2.4.2
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/design/paper-grain.svg
    - assets/design/logo/
    - assets/design/icons/

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  upload_sources: true
