# Lint rules: Very Good Analysis (stricter than flutter_lints, maintained by VGV).
# https://pub.dev/packages/very_good_analysis
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - lib/l10n/generated/**

formatter:
  trailing_commas: preserve

linter:
  rules:
    # This is an application, not a published library. Requiring dartdoc on
    # every public class/field/constructor adds noise without explaining the
    # WHY of the code.
    public_member_api_docs: false
